name: CI

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      FONTAWESOME_NPM_AUTH_TOKEN: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Verify Font Awesome token
        run: |
          if [ -z "$FONTAWESOME_NPM_AUTH_TOKEN" ]; then
            echo "Missing repository secret: FONTAWESOME_NPM_AUTH_TOKEN"
            exit 1
          fi

      - name: Configure npm for Font Awesome Pro
        run: |
          cat <<'EOF' > .npmrc
          @fortawesome:registry=https://npm.fontawesome.com/
          //npm.fontawesome.com/:_authToken=${FONTAWESOME_NPM_AUTH_TOKEN}
          EOF

      - name: Install dependencies
        run: npm ci

      - name: Run algorithm unit tests
        run: npm run test:algorithms

      - name: Build application
        run: npm run build
