name: CI

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      FONTAWESOME_PACKAGE_TOKEN: ${{ secrets.FONTAWESOME_PACKAGE_TOKEN || secrets.FONTAWESOME_NPM_AUTH_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Verify Font Awesome token
        run: |
          if [ -z "$FONTAWESOME_PACKAGE_TOKEN" ]; then
            echo "Missing repository secret: FONTAWESOME_PACKAGE_TOKEN or FONTAWESOME_NPM_AUTH_TOKEN"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run algorithm unit tests
        run: npm run test:algorithms

      - name: Build application
        run: npm run build
