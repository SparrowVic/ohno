name: CI

on:
  push:
  pull_request:
    branches:
      - main
      - production
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    concurrency:
      group: ci-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    env:
      FONTAWESOME_PACKAGE_TOKEN: ${{ secrets.FONTAWESOME_PACKAGE_TOKEN || secrets.FONTAWESOME_NPM_AUTH_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Verify Font Awesome token
        run: |
          if [ -z "$FONTAWESOME_PACKAGE_TOKEN" ]; then
            echo "Missing repository secret: FONTAWESOME_PACKAGE_TOKEN or FONTAWESOME_NPM_AUTH_TOKEN"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run algorithm unit tests
        run: npm run test:algorithms

      - name: Build application
        run: npm run build
