name: CodeQL

on:
  push:
    branches:
      - main
      - production
  pull_request:
    branches:
      - main
      - production
  schedule:
    - cron: '31 4 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    name: Analyze JavaScript and TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FONTAWESOME_PACKAGE_TOKEN: ${{ secrets.FONTAWESOME_PACKAGE_TOKEN || secrets.FONTAWESOME_NPM_AUTH_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Verify Font Awesome token
        run: |
          if [ -z "$FONTAWESOME_PACKAGE_TOKEN" ]; then
            echo "Missing repository secret: FONTAWESOME_PACKAGE_TOKEN or FONTAWESOME_NPM_AUTH_TOKEN"
            exit 1
          fi

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          build-mode: manual
          queries: security-and-quality

      - name: Install dependencies
        run: npm ci

      - name: Build application for analysis
        run: npm run build:dev

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
