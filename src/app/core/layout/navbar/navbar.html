<nav class="navbar">
  <div class="navbar__left">
    <a
      class="navbar__brand"
      routerLink="/algorithms"
      [attr.aria-label]="I18N_KEY.core.navbar.homeAriaLabel | transloco"
    >
      <img
        class="navbar__brand-logo"
        src="/branding/ohno-logo-v38-graph-paper-seal.svg"
        alt="Oh(no)"
      />
    </a>
  </div>

  <div class="navbar__center">
    <app-navbar-tab-deck [tabs]="tabs()" [activeTabId]="activeTabId()" />
  </div>

  <div class="navbar__right">
    <div class="navbar__actions">
      <button
        type="button"
        class="command-trigger"
        [attr.aria-label]="I18N_KEY.core.navbar.commandAriaLabel | transloco"
      >
        <svg
          class="command-trigger__icon"
          viewBox="0 0 16 16"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <circle cx="7" cy="7" r="3.75" />
          <path d="M10.25 10.25L13 13" />
        </svg>
        <span class="command-trigger__copy">
          <span class="command-trigger__eyebrow">{{
            I18N_KEY.core.navbar.searchEyebrow | transloco
          }}</span>
          <span class="command-trigger__label">{{
            I18N_KEY.core.navbar.searchPlaceholder | transloco
          }}</span>
        </span>
        <span class="command-trigger__hint" aria-hidden="true">
          <kbd class="command-trigger__kbd">/</kbd>
          <kbd class="command-trigger__kbd">K</kbd>
        </span>
      </button>
      <app-language-switcher class="navbar__lang" />
    </div>
  </div>
</nav>
