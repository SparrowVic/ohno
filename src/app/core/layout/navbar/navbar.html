<nav class="navbar">
  <div class="navbar__left">
    <a class="navbar__brand" routerLink="/algorithms">
      <span class="navbar__brand-mark" aria-hidden="true">
        <span class="navbar__brand-orbit"></span>
        <span class="navbar__brand-core">O<sup>h</sup></span>
      </span>
      <span class="navbar__brand-copy">
        <span class="navbar__brand-kicker">Visual Algorithm Lab</span>
        <span class="navbar__brand-title">O(no)</span>
      </span>
    </a>
  </div>

  <div class="navbar__center">
    <app-navbar-tab-deck [tabs]="tabs()" [activeTabId]="activeTabId()" [variant]="tabDeckVariant" />
  </div>

  <div class="navbar__right">
    <div class="navbar__actions">
      <button type="button" class="command-trigger" aria-label="Open search and command palette">
        <svg
          class="command-trigger__icon"
          viewBox="0 0 16 16"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <circle cx="7" cy="7" r="3.75" />
          <path d="M10.25 10.25L13 13" />
        </svg>
        <span class="command-trigger__copy">
          <span class="command-trigger__eyebrow">Search</span>
          <span class="command-trigger__label">{{ searchPlaceholder() }}</span>
        </span>
        <span class="command-trigger__hint" aria-hidden="true">
          <kbd class="command-trigger__kbd">/</kbd>
          <kbd class="command-trigger__kbd">K</kbd>
        </span>
      </button>
      <app-language-switcher class="navbar__lang" />
    </div>
  </div>
</nav>
