<nav class="navbar">
  <div class="navbar__left">
    <button
      type="button"
      class="navbar__toggle"
      aria-label="Toggle sidebar"
      (click)="toggleSidebar()"
    >
      <svg
        viewBox="0 0 16 16"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
      >
        <line x1="3" y1="4" x2="13" y2="4" />
        <line x1="3" y1="8" x2="13" y2="8" />
        <line x1="3" y1="12" x2="13" y2="12" />
      </svg>
    </button>
    <a class="logo" routerLink="/algorithms">
      <div class="logo__icon" aria-hidden="true">
        <span class="logo__mark">O<sup>h</sup></span>
      </div>
      <div class="logo__copy">
        <span class="logo__eyebrow">Algorithm Lab</span>
        <span class="logo__text">O(no)</span>
      </div>
    </a>
  </div>

  <div class="navbar__center">
    <app-navbar-tab-deck [tabs]="tabs()" [activeTabId]="activeTabId()" [variant]="tabDeckVariant" />
  </div>

  <div class="navbar__right">
    <button type="button" class="command-trigger" aria-label="Open search and command palette">
      <svg
        class="command-trigger__icon"
        viewBox="0 0 16 16"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <circle cx="7" cy="7" r="3.75" />
        <path d="M10.25 10.25L13 13" />
      </svg>
      <span class="command-trigger__label">{{ searchPlaceholder() }}</span>
      <span class="command-trigger__hint" aria-hidden="true">
        <kbd class="command-trigger__kbd">/</kbd>
        <kbd class="command-trigger__kbd">K</kbd>
      </span>
    </button>
    <app-language-switcher />
  </div>
</nav>
