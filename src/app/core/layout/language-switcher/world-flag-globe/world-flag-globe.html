<section class="world-globe">
  <div class="world-globe__viewport">
    <div #canvasHost class="world-globe__canvas"></div>
    <div #hoverFlagCard class="world-globe__hover-flag">
      <span class="world-globe__hover-flag-emoji">{{ hoverFlag() }}</span>
      <span class="world-globe__hover-flag-name">{{ hoverHeadline() }}</span>
    </div>

    <div #hud class="world-globe__hud">
      <div class="world-globe__hud-bottom">
        <div class="world-globe__badge">
          <span class="world-globe__badge-eyebrow">{{ badgeEyebrow() }}</span>
          <strong class="world-globe__badge-title">{{ hoverFlag() }} {{ hoverHeadline() }}</strong>
          <span class="world-globe__badge-copy">{{ hoverNote() }}</span>
        </div>

        <div class="world-globe__legend">
          <span class="world-globe__legend-pill">{{ legendHoverCountry() }}</span>
          <span class="world-globe__legend-pill">{{ legendDragOrbit() }}</span>
          <span class="world-globe__legend-pill">{{ legendWheelZoom() }}</span>
        </div>
      </div>
    </div>

    @if (loading()) {
      <div class="world-globe__overlay world-globe__overlay--loading">
        <div class="world-globe__loader"></div>
        <p>{{ loadingLabel() }}</p>
      </div>
    }

    @if (loadError()) {
      <div class="world-globe__overlay world-globe__overlay--error">
        <p>{{ loadErrorMessage() }}</p>
      </div>
    }
  </div>
</section>
