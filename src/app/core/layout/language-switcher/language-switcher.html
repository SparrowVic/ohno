<div class="lang-switcher">
  <button
    type="button"
    class="lang-switcher__trigger"
    [class.lang-switcher__trigger--open]="open()"
    [attr.aria-expanded]="open()"
    [attr.aria-label]="I18N_KEY.core.languageSwitcher.openAriaLabel | transloco"
    (click)="toggleOpen()"
  >
    <span class="lang-switcher__orb" aria-hidden="true">
      <span class="lang-switcher__orb-core"></span>
    </span>

    <span class="lang-switcher__copy">
      <span class="lang-switcher__eyebrow">{{
        I18N_KEY.core.languageSwitcher.eyebrow | transloco
      }}</span>
      <span class="lang-switcher__label">{{ activeLangLabel() }}</span>
    </span>

    <span class="lang-switcher__meta" aria-hidden="true">250</span>
  </button>

  @if (open()) {
    <div
      class="lang-switcher__overlay"
      role="dialog"
      aria-modal="true"
      [attr.aria-label]="I18N_KEY.core.languageSwitcher.overlayAriaLabel | transloco"
    >
      <button
        #backdrop
        type="button"
        class="lang-switcher__backdrop"
        [attr.aria-label]="I18N_KEY.core.languageSwitcher.closeGlobeAriaLabel | transloco"
        (click)="close()"
      ></button>

      <div #panel class="lang-switcher__panel">
        <button
          type="button"
          class="lang-switcher__close"
          [attr.aria-label]="I18N_KEY.core.languageSwitcher.closeOverlayAriaLabel | transloco"
          (click)="close()"
        >
          {{ I18N_KEY.core.languageSwitcher.closeLabel | transloco }}
        </button>

        <app-world-flag-globe (countrySelected)="onCountrySelected($event)" />
      </div>
    </div>
  }
</div>
