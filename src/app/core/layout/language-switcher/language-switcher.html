<div class="lang-switcher" role="group" aria-label="Language">
  @for (option of options; track option.value) {
    <button
      type="button"
      class="lang-switcher__btn"
      [class.lang-switcher__btn--active]="activeLang() === option.value"
      [attr.aria-pressed]="activeLang() === option.value"
      [attr.title]="'Switch language to ' + option.label"
      (click)="setLang(option.value)"
    >
      {{ option.label }}
    </button>
  }
</div>
