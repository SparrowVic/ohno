<div class="lang-switcher">
  <button
    type="button"
    class="lang-switcher__trigger"
    [class.lang-switcher__trigger--open]="open()"
    [attr.aria-expanded]="open()"
    [attr.aria-label]="openAriaLabel()"
    (click)="toggleOpen()"
  >
    <span class="lang-switcher__orb" aria-hidden="true">
      <span class="lang-switcher__orb-core"></span>
    </span>

    <span class="lang-switcher__copy">
      <span class="lang-switcher__eyebrow">{{ eyebrow() }}</span>
      <span class="lang-switcher__label">{{ activeLangLabel() }}</span>
    </span>

    <span class="lang-switcher__meta" aria-hidden="true">250</span>
  </button>

  @if (open()) {
    <div
      class="lang-switcher__overlay"
      role="dialog"
      aria-modal="true"
      [attr.aria-label]="overlayAriaLabel()"
    >
      <button
        #backdrop
        type="button"
        class="lang-switcher__backdrop"
        [attr.aria-label]="closeGlobeAriaLabel()"
        (click)="close()"
      ></button>

      <div #panel class="lang-switcher__panel">
        <button
          type="button"
          class="lang-switcher__close"
          [attr.aria-label]="closeOverlayAriaLabel()"
          (click)="close()"
        >
          {{ closeLabel() }}
        </button>

        <app-world-flag-globe />
      </div>
    </div>
  }
</div>
