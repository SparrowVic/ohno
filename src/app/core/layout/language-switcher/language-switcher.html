<div class="lang-switcher">
  <app-button
    class="lang-switcher__trigger"
    appearance="soft"
    accent="brand"
    size="md"
    [active]="open()"
    [expanded]="open()"
    [wide]="true"
    [leftIcon]="icons.globe"
    [label]="I18N_KEY.core.languageSwitcher.eyebrow | transloco"
    [suffix]="activeLangShort()"
    [ariaLabel]="I18N_KEY.core.languageSwitcher.openAriaLabel | transloco"
    [title]="activeLangLabel()"
    (buttonClick)="toggleOpen()"
  />

  @if (open()) {
    <div
      class="lang-switcher__overlay"
      role="dialog"
      aria-modal="true"
      [attr.aria-label]="I18N_KEY.core.languageSwitcher.overlayAriaLabel | transloco"
    >
      <button
        #backdrop
        type="button"
        class="lang-switcher__backdrop"
        [attr.aria-label]="I18N_KEY.core.languageSwitcher.closeGlobeAriaLabel | transloco"
        (click)="close()"
      ></button>

      <div #panel class="lang-switcher__panel">
        <app-button
          class="lang-switcher__close"
          appearance="tonal"
          accent="warm"
          size="sm"
          [label]="I18N_KEY.core.languageSwitcher.closeLabel | transloco"
          [rightIcon]="icons.close"
          [ariaLabel]="I18N_KEY.core.languageSwitcher.closeOverlayAriaLabel | transloco"
          (buttonClick)="close()"
        />

        <app-world-flag-globe (countrySelected)="onCountrySelected($event)" />
      </div>
    </div>
  }
</div>
