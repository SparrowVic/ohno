<article
  class="card"
  [class.card--insane]="isInsane()"
  [class.card--disabled]="!structure().implemented"
  [attr.data-difficulty]="structure().difficulty"
  [attr.aria-disabled]="!structure().implemented"
  [ngStyle]="cardStyle()"
  [appRoadmapOverlay]="!structure().implemented"
  [roadmapOverlayChip]="roadmapChipLabel()"
  [roadmapOverlayTitle]="roadmapTitle()"
  [roadmapOverlayHint]="roadmapHint()"
>
  <span class="card__stripe" aria-hidden="true"></span>

  <div class="card__eyebrow">
    <span class="card__section">
      <span class="card__difficulty-pips" aria-hidden="true">
        @for (filled of difficultyPips(); track $index) {
          <span class="card__pip" [class.card__pip--on]="filled"></span>
        }
      </span>
      <span class="card__facet">{{ facetLabel() }}</span>
    </span>
    <app-ui-tag
      [label]="statusLabel()"
      [tone]="structure().implemented ? 'easy' : 'medium'"
      appearance="soft"
      size="md"
      [uppercase]="true"
    />
  </div>

  <div class="card__title-block">
    <div class="card__title-row">
      <h2 class="card__name">{{ structure().name }}</h2>
      <app-ui-tag
        [label]="difficultyLabel()"
        [tone]="structure().difficulty"
        appearance="soft"
        size="md"
        [uppercase]="true"
      />
    </div>
    <p class="card__desc">{{ structure().description }}</p>
  </div>

  <div class="card__preview" aria-hidden="true">
    <app-structure-card-preview class="card__preview-art" [structure]="structure()" />

    <div class="card__preview-meta">
      <app-ui-tag [label]="statusLabel()" appearance="outline" size="md" />
      <span class="card__preview-hint">{{ previewHint() }}</span>
    </div>
  </div>

  <div class="card__footer">
    <div class="card__tags">
      @for (tag of displayTags(); track tag) {
        <app-ui-tag [label]="tag" appearance="soft" size="sm" [uppercase]="true" />
      }
      @if (hiddenTagsCount() > 0) {
        <app-ui-tag
          [label]="'+' + hiddenTagsCount()"
          appearance="ghost"
          size="sm"
          [uppercase]="true"
        />
      }
    </div>

    <span class="card__cta">{{ ctaLabel() }}</span>
  </div>
</article>
