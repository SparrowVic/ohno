<div class="trace">
  @if (state(); as geo) {
    <div class="trace__header">
      <app-segmented-panel class="trace__summary" aria-label="Delaunay summary">
        <app-segmented-panel-section eyebrow="Triangle" [value]="geo.activeTriangleLabel" />
        <app-segmented-panel-section
          eyebrow="Committed"
          [value]="geo.triangleCount"
          [valueMono]="true"
        />
      </app-segmented-panel>

      <app-segmented-panel class="trace__streams" aria-label="Delaunay details">
        <app-segmented-panel-section eyebrow="Circumcircle">
          <app-table
            class="trace__table"
            [columns]="circleColumns"
            [rows]="circleRows()"
            [showHeader]="false"
            density="compact"
          />
        </app-segmented-panel-section>

        <app-segmented-panel-section eyebrow="Triangle rail" [badge]="geo.events.length">
          <div class="trace__chips">
            @if (geo.events.length === 0) {
              <span class="trace__placeholder">No queued triangles yet.</span>
            } @else {
              @for (event of geo.events; track event.id) {
                <span class="trace__chip trace__chip--{{ event.tone }}">{{ event.label }}</span>
              }
            }
          </div>
        </app-segmented-panel-section>
      </app-segmented-panel>
    </div>
  } @else {
    <div class="trace__empty">No trace data for this geometry step.</div>
  }
</div>
