<app-viz-panel>
  <app-viz-header [phase]="phaseLabel()" [action]="actionText()" [tone]="headerTone()" />

  @if (searchState(); as search) {
    <div class="search-viz__board" #container>
      <div class="search-viz__row">
        @for (value of step()?.array ?? []; track $index) {
          <div
            [class]="cellClass($index)"
            [class.cell--window-glow]="isInsideWindow($index)"
            [attr.data-index]="$index"
          >
            <div class="cell__beam"></div>
            <div class="cell__chrome">
              <span class="cell__index">#{{ $index }}</span>
              @if (boundLabelKey($index); as labelKey) {
                <span class="cell__bound">{{ labelKey | transloco }}</span>
              }
            </div>
            <div class="cell__value">{{ value }}</div>
          </div>
        }
      </div>
    </div>
  }
</app-viz-panel>
