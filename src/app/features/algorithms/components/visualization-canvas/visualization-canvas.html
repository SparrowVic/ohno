<div class="canvas">
  @switch (variant()) {
    @case ('bar') {
      <app-bar-chart-visualization [array]="array()" [step]="step()" [speed]="speed()" />
    }
    @case ('block') {
      <app-block-swap-visualization [array]="array()" [step]="step()" [speed]="speed()" />
    }
    @case ('gradient') {
      <app-color-gradient-visualization [array]="array()" [step]="step()" [speed]="speed()" />
    }
    @case ('dot') {
      <app-dot-plot-visualization [array]="array()" [step]="step()" [speed]="speed()" />
    }
    @case ('radial') {
      <app-radial-visualization [array]="array()" [step]="step()" [speed]="speed()" />
    }
    @case ('radix') {
      <app-radix-bucket-visualization [array]="array()" [step]="step()" [speed]="speed()" />
    }
    @case ('radix-strip') {
      <app-radix-strip-visualization [array]="array()" [step]="step()" [speed]="speed()" />
    }
    @case ('radix-matrix') {
      <app-radix-matrix-visualization [array]="array()" [step]="step()" [speed]="speed()" />
    }
    @case ('dijkstra-graph') {
      <app-dijkstra-graph-visualization [graph]="graph()" [step]="step()" [speed]="speed()" />
    }
    @case ('sound') {
      <app-sound-bars-visualization
        [array]="array()"
        [step]="step()"
        [speed]="speed()"
        [muted]="muted()"
      />
    }
  }
</div>
