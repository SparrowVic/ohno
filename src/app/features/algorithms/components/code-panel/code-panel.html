<div class="code-view">
  @for (line of lines(); track line.number) {
    <div
      class="code-line"
      [class.code-line--highlight]="line.number === activeLineNumber()"
    >
      <span class="line-num">{{ line.number }}</span>
      <span class="line-code">
        @for (token of line.tokens; track $index) {
          <span [class]="tokenClass(token.kind)">{{ token.text }}</span>
        }
      </span>
    </div>
  }
</div>
