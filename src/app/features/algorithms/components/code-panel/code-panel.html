<div class="code-shell">
  @if (hasLines()) {
    <div class="code-toolbar">
      <app-code-language-dial
        class="code-toolbar__dial"
        [options]="availableLanguages()"
        [value]="selectedLanguage()"
        [ariaLabel]="'Code language switcher'"
        (valueChange)="selectLanguage($event)"
      />

      <button type="button" class="code-copy-button code-toolbar__copy" (click)="copyCurrentCode()">
        <fa-icon [icon]="copied() ? icons.check : icons.copy" />
        <span>{{ copied() ? 'Copied' : 'Copy code' }}</span>
      </button>
    </div>

    <div class="code-scroll">
      <div
        #renderRoot
        class="code-render"
        (click)="onRenderClick($event)"
        [innerHTML]="highlightedHtml()"
      ></div>
    </div>
  } @else {
    <div class="code-empty">No code available.</div>
  }
</div>
