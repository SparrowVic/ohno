<app-viz-panel>
  <app-viz-header [phase]="phaseLabel()" [action]="actionText()" [tone]="headerTone()" />

  @if (geoState()) {
    <div class="mkv__stage">
      <div class="mkv__gallery">
        <article class="mkv__card">
          <div class="mkv__card-head">
            <span class="mkv__eyebrow">Input A</span>
            <span class="mkv__title">Obstacle</span>
          </div>
          <svg class="mkv__mini" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
            @if (obstacle(); as polygon) {
              <polygon [attr.points]="galleryPoints(polygon)" class="mkv__poly mkv__poly--a" />
            }
          </svg>
        </article>

        <article class="mkv__card">
          <div class="mkv__card-head">
            <span class="mkv__eyebrow">Input B</span>
            <span class="mkv__title">Robot</span>
          </div>
          <svg class="mkv__mini" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
            @if (robot(); as polygon) {
              <polygon [attr.points]="galleryPoints(polygon)" class="mkv__poly mkv__poly--b" />
            }
          </svg>
        </article>

        <article class="mkv__card">
          <div class="mkv__card-head">
            <span class="mkv__eyebrow">Reflected</span>
            <span class="mkv__title">-B</span>
          </div>
          <svg class="mkv__mini" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
            @if (reflected(); as polygon) {
              <polygon [attr.points]="galleryPoints(polygon)" class="mkv__poly mkv__poly--reflected" />
            }
          </svg>
        </article>
      </div>

      <svg class="mkv__sum" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
        @if (result(); as polygon) {
          <polygon
            [attr.points]="stagePoints(polygon)"
            [class]="'mkv__poly ' + (polygon.tone === 'result' ? 'mkv__poly--result' : 'mkv__poly--preview')"
          />
          @for (vertex of polygon.vertices; track $index) {
            <g [attr.transform]="stageVertexTransform(vertex)">
              <circle class="mkv__vertex-glow" r="4.2" />
              <circle class="mkv__vertex" r="2" />
            </g>
          }
        }
      </svg>
    </div>
  }
</app-viz-panel>
