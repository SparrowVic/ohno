@if (keyIdea() || watch()) {
  <app-segmented-panel
    class="trace-hint"
    [attr.aria-label]="I18N_KEY.features.algorithms.traceHint.ariaLabel | transloco"
  >
    <app-segmented-panel-section>
      <div class="trace-hint__row">
        <span class="trace-hint__icon" aria-hidden="true">
          <fa-icon [icon]="lightbulbIcon" />
        </span>
        <div class="trace-hint__copy">
          @if (keyIdea(); as idea) {
            <p class="trace-hint__idea">
              {{ looksLikeI18nKey(idea) ? (idea | transloco) : idea }}
            </p>
          }
          @if (watch(); as watchText) {
            <p class="trace-hint__watch">
              {{ looksLikeI18nKey(watchText) ? (watchText | transloco) : watchText }}
            </p>
          }
        </div>
      </div>
    </app-segmented-panel-section>
  </app-segmented-panel>
}
