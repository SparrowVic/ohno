<app-viz-panel>
  <app-viz-header [phase]="phaseLabel()" [action]="actionText()" [tone]="headerTone()" />

  @if (geoState(); as geo) {
    <div class="geo-stage">
      <svg class="geo-svg" viewBox="-6 -6 112 112" preserveAspectRatio="xMidYMid meet">
        <defs>
          <pattern id="slv-grid" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
            <path
              d="M 10 0 L 0 0 0 10"
              fill="none"
              stroke="rgba(255, 255, 255, 0.055)"
              stroke-width="0.3"
            />
          </pattern>
        </defs>
        <rect x="-6" y="-6" width="112" height="112" fill="url(#slv-grid)" />

        @if (geo.fillWidth !== null) {
          <rect x="0" y="0" [attr.width]="geo.fillWidth" height="100" class="slv-progress" />
        }

        @for (rect of geo.rectangles; track rect.id) {
          <rect
            [attr.x]="rect.x"
            [attr.y]="100 - rect.y - rect.height"
            [attr.width]="rect.width"
            [attr.height]="rect.height"
            class="slv-rect slv-rect--{{ rectToneClass(rect.tone) }}"
          />
        }

        @if (geo.sweepX !== null) {
          <line [attr.x1]="geo.sweepX" y1="0" [attr.x2]="geo.sweepX" y2="100" class="geo-sweep" />
        }

        <g transform="translate(92, 6)">
          @for (span of geo.spans; track span.id) {
            <rect
              x="0"
              [attr.y]="100 - span.y1"
              width="4"
              [attr.height]="span.y1 - span.y0"
              class="slv-span"
            />
          }
        </g>
      </svg>
    </div>
  }
</app-viz-panel>
