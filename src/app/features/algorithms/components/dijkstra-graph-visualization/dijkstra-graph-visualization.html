<section class="graph-shell">
  <div class="graph-shell__hud">
    <div class="hud-card" [class.hud-card--changed]="isCardChanged('source')">
      <span class="hud-card__label">Source</span>
      <span class="hud-card__value">{{ sourceLabel() }}</span>
    </div>
    <div class="hud-card" [class.hud-card--changed]="isCardChanged('current')">
      <span class="hud-card__label">Current</span>
      <span class="hud-card__value">{{ currentLabel() }}</span>
    </div>
    <div class="hud-card" [class.hud-card--changed]="isCardChanged('settled')">
      <span class="hud-card__label">Settled</span>
      <span class="hud-card__value">{{ settledCount() }}</span>
    </div>
    <div class="hud-card" [class.hud-card--changed]="isCardChanged('queue')">
      <span class="hud-card__label">Queue</span>
      <span class="hud-card__value">{{ frontierCount() }}</span>
    </div>
  </div>

  <div class="graph-shell__focus">
    <div class="focus-pill" [class.focus-pill--changed]="isCardChanged('phase')">
      <span class="focus-pill__label">Phase</span>
      <span class="focus-pill__value">{{ phaseLabel() }}</span>
    </div>
    <div class="focus-pill" [class.focus-pill--changed]="isCardChanged('edge')">
      <span class="focus-pill__label">Edge</span>
      <span class="focus-pill__value">{{ activeEdgeLabel() }}</span>
    </div>
    <div class="focus-pill" [class.focus-pill--changed]="isCardChanged('queueLead')">
      <span class="focus-pill__label">Queue head</span>
      <span class="focus-pill__value">{{ queueLead() }}</span>
    </div>
    <div class="focus-pill" [class.focus-pill--changed]="isCardChanged('path')">
      <span class="focus-pill__label">Path</span>
      <span class="focus-pill__value">{{ pathPreview() }}</span>
    </div>
  </div>

  <svg class="graph" viewBox="0 0 960 620" preserveAspectRatio="xMidYMid meet">
    <defs>
      <linearGradient id="graphEdgeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#5eead4" />
        <stop offset="100%" stop-color="#7c6ef0" />
      </linearGradient>
      <filter id="graphNodeGlow">
        <feGaussianBlur stdDeviation="8" result="blur" />
        <feMerge>
          <feMergeNode in="blur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
    </defs>

    @for (edge of edges(); track edge.id) {
      <g class="edge-group">
        <line
          class="edge-line"
          [class.edge-line--tree]="edge.isTree"
          [class.edge-line--active]="edge.isActive"
          [class.edge-line--relaxed]="edge.isRelaxed"
          [class.edge-line--muted]="isEdgeMuted(edge.id)"
          [attr.x1]="edgePoint(edge.id, 'from', 'x')"
          [attr.y1]="edgePoint(edge.id, 'from', 'y')"
          [attr.x2]="edgePoint(edge.id, 'to', 'x')"
          [attr.y2]="edgePoint(edge.id, 'to', 'y')"
        />
        <g class="edge-weight" [attr.transform]="weightTransform(edge.id)">
          <rect x="-18" y="-14" width="36" height="28" rx="14" />
          <text y="4">{{ edge.weight }}</text>
        </g>
      </g>
    }

    @for (node of nodes(); track node.id) {
      <g
        class="node"
        [class.node--source]="node.isSource"
        [class.node--frontier]="node.isFrontier"
        [class.node--current]="node.isCurrent"
        [class.node--settled]="node.isSettled"
        [class.node--muted]="isNodeMuted(node.id)"
        [attr.transform]="'translate(' + node.x + ' ' + node.y + ')'"
      >
        <circle class="node__halo" r="40" />
        <circle class="node__body" r="28" filter="url(#graphNodeGlow)" />
        <text class="node__label" y="6">{{ node.label }}</text>

        <g class="node__distance" transform="translate(0 -48)">
          <rect x="-22" y="-14" width="44" height="28" rx="14" />
          <text y="4">{{ formatDistance(node.distance) }}</text>
        </g>

        <g class="node__previous" transform="translate(0 50)">
          <rect x="-30" y="-12" width="60" height="24" rx="12" />
          <text y="4">prev {{ previousLabel(node.previousId) }}</text>
        </g>
      </g>
    }
  </svg>
</section>
