<app-viz-panel>
  <app-viz-header [phase]="phaseLabel()" [action]="actionText()" [tone]="headerTone()" />

  @if (state()) {
    <svg
      #container
      class="network"
      [attr.viewBox]="viewBox()"
      preserveAspectRatio="xMidYMid meet"
    >
      <defs>
        <linearGradient id="networkEdgeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="var(--viz-route)" />
          <stop offset="100%" stop-color="var(--viz-window)" />
        </linearGradient>
        @for (marker of arrowMarkers; track marker.id) {
          <marker
            [attr.id]="marker.id"
            markerWidth="9"
            markerHeight="9"
            refX="8"
            refY="4.5"
            orient="auto"
            markerUnits="userSpaceOnUse"
          >
            <path d="M0 0L9 4.5L0 9Z" [attr.fill]="marker.fill" />
          </marker>
        }
        <filter id="networkNodeGlow">
          <feGaussianBlur stdDeviation="4" result="blur" />
          <feMerge>
            <feMergeNode in="blur" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>
      </defs>

      @for (edge of edges(); track edge.id) {
        <g class="edge-group" [attr.data-edge-id]="edge.id">
          <line
            class="edge-line edge-line--{{ edge.status }}"
            [attr.marker-end]="edgeMarker(edge)"
            [attr.x1]="edge.x1"
            [attr.y1]="edge.y1"
            [attr.x2]="edge.x2"
            [attr.y2]="edge.y2"
          />
          <g
            class="edge-label"
            [attr.transform]="'translate(' + edge.midX + ' ' + edge.midY + ')'"
          >
            <rect x="-22" y="-13" width="44" height="26" rx="6" />
            <text class="edge-label__primary" y="-1">{{ edge.primaryText }}</text>
            @if (edge.secondaryText) {
              <text class="edge-label__secondary" y="10">{{ edge.secondaryText }}</text>
            }
          </g>
        </g>
      }

      @for (node of nodes(); track node.id) {
        <g
          class="node node--{{ node.status }}"
          [attr.data-lane]="node.lane"
          [attr.transform]="'translate(' + node.x + ' ' + node.y + ')'"
          [attr.data-node-id]="node.id"
        >
          <circle class="node__halo" r="30" />
          <circle class="node__body" r="22" filter="url(#networkNodeGlow)" />
          <text class="node__label" y="5">{{ node.label }}</text>

          <g class="node__metric" transform="translate(0 -36)">
            <rect x="-22" y="-11" width="44" height="22" rx="7" />
            <text y="3">{{ levelLabel(node) }}</text>
          </g>

          <g class="node__link" transform="translate(0 38)">
            <rect x="-32" y="-10" width="64" height="20" rx="6" />
            <text y="3">{{ linkLabel(node) }}</text>
          </g>
        </g>
      }
    </svg>
  } @else {
    <p class="network-shell__empty">
      {{ I18N_KEY.features.algorithms.visualizations.network.emptyLabel | transloco }}
    </p>
  }
</app-viz-panel>
