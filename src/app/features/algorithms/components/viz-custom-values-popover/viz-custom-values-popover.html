<app-popover (close)="close.emit()">
  <header class="custom-values__header">
    <h3 class="custom-values__title">
      {{ I18N_KEY.features.algorithms.toolbar.customizeValues.title | transloco }}
    </h3>
  </header>

  <form class="custom-values__form" (submit)="$event.preventDefault(); onApply()">
    @for (field of fields(); track field.key) {
      @if (isNumberField(field.field)) {
        <app-number-input
          [label]="field.label"
          [placeholder]="field.placeholder"
          [error]="field.error ? (field.error | i18nText) : null"
          [formControl]="$any(field.control)"
        />
      } @else if (isStringField(field.field)) {
        <app-text-input
          [label]="field.label"
          [placeholder]="field.placeholder"
          [error]="field.error ? (field.error | i18nText) : null"
          [mono]="true"
          [formControl]="$any(field.control)"
        />
      }
    }

    @if (crossFieldError(); as err) {
      <p class="custom-values__cross-error" role="alert">
        {{ err | i18nText }}
      </p>
    }

    <footer class="custom-values__actions">
      <app-button
        appearance="ghost"
        accent="neutral"
        size="sm"
        [label]="I18N_KEY.features.algorithms.toolbar.customizeValues.cancelLabel | transloco"
        (buttonClick)="onCancel()"
      />
      <app-button
        type="submit"
        appearance="solid"
        accent="primary"
        size="sm"
        [disabled]="!canApply()"
        [label]="I18N_KEY.features.algorithms.toolbar.customizeValues.applyLabel | transloco"
      />
    </footer>
  </form>
</app-popover>
