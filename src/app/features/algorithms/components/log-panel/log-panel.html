<div #scroll class="log">
  @if (entries().length === 0) {
    <div class="log__empty">Run the scenario to start a chronological trace.</div>
  } @else {
    @for (entry of entries(); track entry.timestamp) {
      <div class="log__entry">
        <span class="log__marker" aria-hidden="true"></span>
        <div class="log__body">
          <span class="log__step">Step {{ entry.step }}</span>
          <span class="log__desc">{{ entry.description }}</span>
        </div>
      </div>
    }
  }
</div>
