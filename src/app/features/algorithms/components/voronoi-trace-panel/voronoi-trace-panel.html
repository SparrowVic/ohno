<div class="trace">
  @if (state(); as geo) {
    <div class="trace__header">
      <app-segmented-panel class="trace__summary" aria-label="Voronoi summary">
        <app-segmented-panel-section eyebrow="Cell" [value]="geo.currentCellLabel" />
        <app-segmented-panel-section
          eyebrow="Closed cells"
          [value]="geo.closedCells"
          [valueMono]="true"
        />
        <app-segmented-panel-section
          eyebrow="Sweep y"
          [value]="geo.sweepY !== null ? geo.sweepY.toFixed(1) : 'done'"
          [valueMono]="true"
        />
      </app-segmented-panel>

      <app-segmented-panel class="trace__streams" aria-label="Voronoi details">
        <app-segmented-panel-section eyebrow="Active site">
          <app-table
            class="trace__table"
            [columns]="siteColumns"
            [rows]="siteRows()"
            [showHeader]="false"
            density="compact"
          />
        </app-segmented-panel-section>

        <app-segmented-panel-section eyebrow="Site event rail" [badge]="geo.events.length">
          <div class="trace__chips">
            @if (geo.events.length === 0) {
              <span class="trace__placeholder">No queued sites yet.</span>
            } @else {
              @for (event of geo.events; track event.id) {
                <span class="trace__chip trace__chip--{{ event.tone }}">{{ event.label }}</span>
              }
            }
          </div>
        </app-segmented-panel-section>
      </app-segmented-panel>
    </div>
  } @else {
    <div class="trace__empty">No trace data for this geometry step.</div>
  }
</div>
