<app-viz-panel>
  <app-viz-header [phase]="phaseLabel()" [action]="actionText()" [tone]="headerTone()" />

  @if (geoState(); as geo) {
    <div class="dlv__stage">
      <svg class="dlv__svg" viewBox="-6 -6 112 112" preserveAspectRatio="xMidYMid meet">
        <defs>
          <pattern id="dlv-grid" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
            <path d="M 10 0 L 0 0 0 10" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.3" />
          </pattern>
        </defs>
        <rect x="-6" y="-6" width="112" height="112" fill="url(#dlv-grid)" />

        @for (triangle of geo.triangles; track triangle.id) {
          <polygon [attr.points]="polygonPoints(triangle)" [class]="'dlv__triangle dlv__triangle--' + triangle.tone" />
        }

        @for (edge of geo.edges; track edge.id) {
          <line
            [attr.x1]="edge.start.x"
            [attr.y1]="100 - edge.start.y"
            [attr.x2]="edge.end.x"
            [attr.y2]="100 - edge.end.y"
            class="dlv__edge"
          />
        }

        @for (circle of geo.circles; track circle.id) {
          <circle
            [attr.cx]="circle.cx"
            [attr.cy]="100 - circle.cy"
            [attr.r]="circle.r"
            [class]="'dlv__circle dlv__circle--' + circle.tone"
          />
        }

        @for (point of geo.points; track point.id) {
          <g [attr.transform]="'translate(' + point.x + ',' + (100 - point.y) + ')'">
            <circle [class]="'dlv__point ' + (point.status === 'compare' ? 'dlv__point--active' : 'dlv__point--idle')" r="3.2" />
            <circle [class]="'dlv__point-glow ' + (point.status === 'compare' ? 'dlv__point-glow--active' : 'dlv__point-glow--idle')" r="5.8" />
          </g>
        }
      </svg>
    </div>
  }
</app-viz-panel>
