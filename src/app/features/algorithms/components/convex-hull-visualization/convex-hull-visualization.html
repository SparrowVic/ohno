<app-viz-panel>
  <app-viz-header [phase]="phaseLabel()" [action]="actionText()" [tone]="headerTone()" />

  @if (geoState()) {
    <div class="chv__stage">
      <svg class="chv__svg" viewBox="-6 -6 112 112" preserveAspectRatio="xMidYMid meet">
        <defs>
          <pattern id="chv-dots" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
            <circle cx="0" cy="0" r="0.4" fill="rgba(255,255,255,0.07)" />
          </pattern>
        </defs>
        <rect x="-6" y="-6" width="112" height="112" fill="url(#chv-dots)" />

        @if (isComplete()) {
          <polygon [attr.points]="hullPolyPoints()" class="chv__hull-poly" />
        }

        @if (turnTriPoints(); as triPts) {
          <polygon [attr.points]="triPts" class="chv__turn-tri" />
        }

        @for (edge of edges(); track edge.fromId + '-' + edge.toId) {
          <line
            [attr.x1]="ptSvgX(edge.fromId)"
            [attr.y1]="ptSvgY(edge.fromId)"
            [attr.x2]="ptSvgX(edge.toId)"
            [attr.y2]="ptSvgY(edge.toId)"
            [class]="'chv__edge chv__edge--' + edge.kind"
          />
        }

        @for (pt of points(); track pt.id) {
          <g [attr.transform]="ptTransform(pt)">
            @if (showGlow(pt)) {
              <circle [class]="'chv__glow chv__glow--' + pt.status" r="8" />
            }
            <circle [class]="'chv__pt chv__pt--' + pt.status" r="4.2" />

            @if (pt.sortIndex !== null && pt.sortIndex !== undefined && pt.sortIndex > 0) {
              <text class="chv__sort-badge" y="-7" text-anchor="middle">{{ pt.sortIndex }}</text>
            }

            <text class="chv__pt-id" text-anchor="middle" dominant-baseline="middle">{{ pt.id }}</text>
          </g>
        }
      </svg>
    </div>
  }
</app-viz-panel>
