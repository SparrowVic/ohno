<app-viz-panel>
  <app-viz-header [phase]="phaseLabel()" [action]="actionText()" [tone]="headerTone()" />

  @if (gridState(); as grid) {
    <div class="grid-viz__board-shell" #container>
      <div
        class="grid-viz__board"
        [style.grid-template-columns]="boardColumns()"
        [style.--grid-cols]="grid.cols"
      >
        @for (cell of grid.cells; track cell.id) {
          <div
            [class]="cellClass(cell.status)"
            [attr.data-cell-id]="cell.id"
            [attr.data-tone]="cell.tone ?? null"
          >
            <div class="grid-cell__chrome">
              <span class="grid-cell__meta">{{ cell.metaLabel ?? ' ' }}</span>
            </div>
            <div class="grid-cell__value">{{ cellCoreLabel(cell) }}</div>
          </div>
        }
      </div>
    </div>
  }
</app-viz-panel>
