@if (options().length > 0) {
  <div class="viz-preset-picker">
    @for (option of options(); track option.id) {
      <button
        type="button"
        class="viz-preset-picker__chip"
        [class.viz-preset-picker__chip--active]="activeId() === option.id"
        (click)="select(option.id)"
      >
        {{ looksLikeI18nKey(option.label) ? (option.label | transloco) : option.label }}
      </button>
    }
  </div>
}
