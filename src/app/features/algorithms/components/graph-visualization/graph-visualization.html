<app-viz-panel>
  <app-viz-header [phase]="phaseLabel()" [action]="actionText()" [tone]="headerTone()">
    @if (focusChipVisible()) {
      <button
        class="graph-focus-chip"
        type="button"
        (click)="clearFocus()"
        [attr.aria-label]="I18N.clearFocusAriaLabel | transloco"
      >
        <span class="graph-focus-chip__text">{{ focusedPathText() }}</span>
        <span class="graph-focus-chip__close" aria-hidden="true">×</span>
      </button>
    }
  </app-viz-header>

  <svg class="graph" viewBox="0 0 960 620" preserveAspectRatio="xMidYMid meet">
    <defs>
      <linearGradient id="graphEdgeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="var(--viz-route)" />
        <stop offset="100%" stop-color="var(--viz-window)" />
      </linearGradient>
      @for (marker of arrowMarkers; track marker.id) {
        <marker
          [attr.id]="marker.id"
          markerWidth="9"
          markerHeight="9"
          refX="8"
          refY="4.5"
          orient="auto"
          markerUnits="userSpaceOnUse"
        >
          <path d="M0 0L9 4.5L0 9Z" [attr.fill]="marker.fill" />
        </marker>
      }
      <filter id="graphNodeGlow">
        <feGaussianBlur stdDeviation="4" result="blur" />
        <feMerge>
          <feMergeNode in="blur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
    </defs>

    @for (edge of edges(); track edge.id) {
      <g class="edge-group">
        <line
          class="edge-line"
          [attr.data-tone]="edge.tone ?? null"
          [class.edge-line--tree]="edge.isTree"
          [class.edge-line--focused]="isEdgeFocused(edge.id)"
          [class.edge-line--active]="edge.isActive"
          [class.edge-line--relaxed]="edge.isRelaxed"
          [class.edge-line--muted]="isEdgeMuted(edge.id)"
          [attr.marker-end]="edgeMarker(edge)"
          [attr.x1]="edge.x1"
          [attr.y1]="edge.y1"
          [attr.x2]="edge.x2"
          [attr.y2]="edge.y2"
        />
        @if (showEdgeWeights()) {
          <g class="edge-weight" [attr.transform]="'translate(' + edge.midX + ' ' + edge.midY + ')'">
            <rect x="-15" y="-10" width="30" height="20" rx="6" />
            <text y="3">{{ edge.weight }}</text>
          </g>
        }
      </g>
    }

    @for (node of nodes(); track node.id) {
      <g
        class="node"
        [class.node--source]="node.isSource"
        [class.node--frontier]="node.isFrontier"
        [class.node--current]="node.isCurrent"
        [class.node--settled]="node.isSettled"
        [class.node--selected]="isNodeSelected(node.id)"
        [class.node--path]="isNodeInFocusedPath(node.id)"
        [class.node--muted]="isNodeMuted(node.id)"
        [attr.data-tone]="node.tone ?? null"
        [attr.transform]="'translate(' + node.x + ' ' + node.y + ')'"
        [class.node--clickable]="routeMode()"
        (click)="selectNode(node.id)"
      >
        <circle class="node__halo" r="30" />
        <circle class="node__body" r="22" filter="url(#graphNodeGlow)" />
        <text class="node__label" y="5">{{ node.label }}</text>

        @if (showNodeLabels()) {
          <g class="node__distance" transform="translate(0 -36)">
            @let distanceWidth = distanceChipWidth(node);
            <rect [attr.x]="-distanceWidth / 2" y="-11" [attr.width]="distanceWidth" height="22" rx="7" />
            <text class="node__metric-label" y="-14">{{ metricLabel() }}</text>
            <text y="3">{{ formatDistance(node.distance) }}</text>
          </g>

          <g class="node__previous" transform="translate(0 38)">
            @let secondaryTextValue = secondaryChipText(node.id);
            @let secondaryWidth = secondaryChipWidth(node.id);
            <rect [attr.x]="-secondaryWidth / 2" y="-10" [attr.width]="secondaryWidth" height="20" rx="6" />
            <text y="3">{{ secondaryTextValue }}</text>
          </g>
        }
      </g>
    }
  </svg>
</app-viz-panel>
