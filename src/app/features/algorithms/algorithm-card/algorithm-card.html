<article class="card">
  <div class="card__top">
    <span class="card__name">{{ algorithm().name }}</span>
    <span class="badge badge--{{ algorithm().difficulty }}">
      {{ algorithm().difficulty | titlecase }}
    </span>
  </div>

  <p class="card__desc">{{ algorithm().description }}</p>

  <div class="card__preview" aria-hidden="true"></div>

  <div class="card__tags">
    @for (tag of algorithm().tags; track tag) {
      <span class="tag">{{ tag }}</span>
    }
  </div>
</article>
