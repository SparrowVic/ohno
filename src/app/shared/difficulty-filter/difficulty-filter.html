<div class="difficulty-filter" role="group" [attr.aria-label]="ariaLabel()">
  @for (option of options(); track option.value) {
    <button
      type="button"
      class="difficulty-pill"
      [class.difficulty-pill--all]="option.tone === 'all'"
      [class.difficulty-pill--easy]="option.tone === 'easy'"
      [class.difficulty-pill--medium]="option.tone === 'medium'"
      [class.difficulty-pill--hard]="option.tone === 'hard'"
      [class.difficulty-pill--ultra-hard]="option.tone === 'ultra-hard'"
      [class.difficulty-pill--active]="value() === option.value"
      [attr.aria-pressed]="value() === option.value"
      (click)="select(option.value)"
    >
      @if (option.tone === 'ultra-hard' && value() === option.value) {
        <app-shader-card-effect
          class="difficulty-pill__shader"
          seed="shared-insane-filter-pill"
          color="#ff7a2f"
          [positionX]="0.5"
          [positionY]="0.01"
          [speed]="0.4"
          [scale]="3.3"
          [effectRadius]="0.94"
          [effectBoost]="0.28"
          [edgeMin]="0.08"
          [edgeMax]="0.78"
          [falloffPower]="2.1"
          [noiseScale]="1.06"
          [widthFactor]="1.54"
          [waveAmount]="0.07"
          [branchIntensity]="2.05"
          [verticalExtent]="1.54"
          [horizontalExtent]="1.34"
          [blur]="2.2"
          [opacity]="0.42"
        ></app-shader-card-effect>
      }
      <span class="difficulty-pill__label">{{ option.label }}</span>
    </button>
  }
</div>
