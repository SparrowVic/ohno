<div
  class="select-button"
  role="radiogroup"
  [class.select-button--disabled]="disabled()"
  [attr.aria-label]="ariaLabel()"
>
  @if (label()) {
    <span class="select-button__label">{{ label() }}</span>
  }

  <div
    class="select-button__options"
    [style.--select-button-count]="options().length"
    [style.--select-button-index]="activeIndex()"
    [attr.data-tone]="activeTone()"
  >
    <span class="select-button__indicator" aria-hidden="true"></span>
    @for (option of options(); track option.value) {
      <button
        type="button"
        class="select-button__option select-button__option--{{ optionTone(option) }}"
        [class.select-button__option--active]="activeValue() === option.value"
        [attr.aria-checked]="activeValue() === option.value"
        role="radio"
        [disabled]="disabled()"
        (click)="select(option.value)"
      >
        <span class="select-button__option-label">{{ option.label }}</span>
      </button>
    }
  </div>
</div>
