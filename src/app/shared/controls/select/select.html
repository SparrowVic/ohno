<div
  class="select"
  [class.select--open]="open()"
  [class.select--disabled]="disabled()"
  [class.select--compact]="compact()"
  [class.select--chrome]="chrome()"
>
  <button
    type="button"
    class="select__trigger"
    [attr.aria-expanded]="open()"
    [attr.aria-label]="label() || placeholder()"
    [disabled]="disabled()"
    (click)="toggleOpen($event)"
    (focus)="onTriggerFocus()"
    (keydown)="onTriggerKeydown($event)"
  >
    <span class="select__copy">
      @if (label()) {
        <span class="select__label">{{ label() }}</span>
      }
      <span class="select__value">{{ selectedOption()?.label ?? placeholder() }}</span>
    </span>
    <span class="select__chevron" aria-hidden="true">
      <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M2.5 4.5L6 8l3.5-3.5" />
      </svg>
    </span>
  </button>

  @if (open()) {
    <app-popover class="select__popover" [panelRole]="null" (close)="close()">
      <div class="select__menu" role="listbox">
        @for (option of options(); track option.value) {
          <button
            type="button"
            role="option"
            class="select__option"
            [class.select__option--active]="selectedOption()?.value === option.value"
            [attr.aria-selected]="selectedOption()?.value === option.value"
            (click)="selectOption(option)"
          >
            <span class="select__option-label">{{ option.label }}</span>
            @if (option.hint) {
              <span class="select__option-hint">{{ option.hint }}</span>
            }
          </button>
        }
      </div>
    </app-popover>
  }
</div>
