<div
  class="difficulty"
  role="radiogroup"
  [class.difficulty--disabled]="disabled()"
  [attr.aria-label]="ariaLabel()"
>
  @if (label()) {
    <span class="difficulty__label">{{ label() }}</span>
  }

  <div
    class="difficulty__options"
    [style.--difficulty-count]="options().length"
    [style.--difficulty-index]="activeIndex()"
    [attr.data-tone]="activeValue()"
  >
    <span class="difficulty__indicator" aria-hidden="true"></span>
    @for (option of options(); track option.value) {
      <button
        type="button"
        class="difficulty__option difficulty__option--{{ option.tone }}"
        [class.difficulty__option--active]="activeValue() === option.value"
        [attr.aria-checked]="activeValue() === option.value"
        role="radio"
        [disabled]="disabled()"
        (click)="select(option.value)"
      >
        <span class="difficulty__option-label">{{ option.label }}</span>
      </button>
    }
  </div>
</div>
