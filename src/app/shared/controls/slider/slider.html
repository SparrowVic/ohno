<div class="slider" [class.slider--disabled]="disabled()" [style.--pct]="percent() + '%'">
  <div class="slider__head">
    <span class="slider__label">{{ label() }}</span>
    <span class="slider__value">{{ displayValue() }}</span>
  </div>

  <label class="slider__track">
    <span class="slider__rail"></span>
    <span class="slider__fill"></span>
    <span class="slider__thumb"></span>
    <input
      type="range"
      [min]="min()"
      [max]="max()"
      [step]="step()"
      [value]="value() ?? min()"
      [disabled]="disabled()"
      (input)="onInput($event)"
      (blur)="onBlur()"
    />
  </label>
</div>
