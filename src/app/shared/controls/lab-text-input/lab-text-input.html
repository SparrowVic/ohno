<label
  class="lab-text"
  [class.lab-text--invalid]="hasError()"
  [class.lab-text--mono]="mono()"
>
  <span class="lab-text__field">
    <span class="lab-text__copy">
      <span class="lab-text__label">{{ label() }}</span>
      <input
        class="lab-text__input"
        type="text"
        autocomplete="off"
        spellcheck="false"
        [value]="raw()"
        [disabled]="disabled()"
        [placeholder]="placeholder()"
        [attr.aria-invalid]="hasError()"
        (input)="onInput($event)"
        (blur)="onBlur()"
      />
    </span>
  </span>
  @if (error(); as message) {
    <span class="lab-text__error" role="alert">{{ message }}</span>
  } @else if (hint(); as hintText) {
    <span class="lab-text__hint">{{ hintText }}</span>
  }
</label>
